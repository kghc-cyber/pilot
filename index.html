<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melon Patch | Pilot Program</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --honeydew-mist: #F8FFF8;
            --rind-green: #86C28B;
            --dark-sage: #4A5C4C;
        }

        body {
            background-color: var(--honeydew-mist) !important;
            font-family: 'Inter', sans-serif;
            color: var(--dark-sage);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        /* Exact match for the Serif Italic Headings */
        h1, h2, h3, .serif-brand {
            font-family: 'Playfair Display', serif !important;
            font-style: italic !important;
            font-weight: 400 !important;
            color: var(--dark-sage);
        }

        /* Match for the Caps Spacing */
        .tagline, .caps-tracking, button, footer {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 0.7rem;
        }

        .btn-brand {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--rind-green);
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 1px solid var(--rind-green);
            padding-bottom: 4px;
            text-decoration: none;
        }

        .btn-brand:hover {
            color: var(--dark-sage);
            letter-spacing: 0.45em;
        }

        .img-container {
            mix-blend-mode: multiply;
        }
    </style>
</head>

            </p>
        </section>

                <img src="IMG_3187.png" alt="How to wear your Melon Patch liner" class="w-full h-auto">
            </div>
